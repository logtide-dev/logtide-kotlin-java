name: Release & Publish to Maven Central

on:
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: corretto
          java-version: 17
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run JUnit tests
        run: |
          chmod +x ./gradlew
          bash ./gradlew test

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: corretto
          java-version: 17
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run JUnit tests
        run: |
          chmod +x ./gradlew
          bash ./gradlew test
      - name: Build JAR
        run: |
          chmod +x ./gradlew
          bash ./gradlew clean build -x test

      - name: Publish to Sonatype OSSRH and Maven Central
        env:
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          chmod +x ./gradlew
          bash ./gradlew publishAndReleaseToMavenCentral --no-daemon --stacktrace

      - name: Upload JARs to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for jar in */build/libs/*.jar; do
            gh release upload "${{ github.event.release.tag_name }}" "$jar" --clobber
          done
name: Release & Publish to Maven Central

on:
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: corretto
          java-version: 17
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run JUnit tests
        run: |
          chmod +x ./gradlew
          bash ./gradlew test

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: corretto
          java-version: 17
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run JUnit tests
        run: |
          chmod +x ./gradlew
          bash ./gradlew test
      - name: Build JAR
        run: |
          chmod +x ./gradlew
          bash ./gradlew clean build -x test

      - name: Publish to Sonatype OSSRH and Maven Central
        env:
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
          OSSRH_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          chmod +x ./gradlew
          bash ./gradlew publishAndReleaseToMavenCentral --no-daemon --stacktrace

      - name: Upload JAR to GitHub release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/libs/*.jar
          asset_name: project-${GITHUB_REF_NAME#v}.jar
          asset_content_type: application/java-archive